<!DOCTYPE html>
<html>
<head>
    <title>TestForge</title>
    
       <link rel="stylesheet" href="style.css">
</head>

<body>


<nav>
    <h2>TestForge</h2>
    <a href="#">Home</a>
    <a href="#">Tests</a>
    <a href="#">Login</a>
</nav>


<div class="section">
    <h1>Master Your Exams with Smart Test Series</h1>
    <p>Practice Smart. Rank Faster.</p>
    <button>Start Practice</button>
</div>


<div class="section">
    <h2>Available Tests</h2>

    <div class="cards">
        <div class="card">
            <h3>Java Basics</h3>
            <p>30 mins | 20 Questions</p>
            <button>Start Test</button>
        </div>

        <div class="card">
            <h3>Aptitude</h3>
            <p>45 mins | 25 Questions</p>
            <button>Start Test</button>
        </div>
    </div>
</div>

<div class="section">
    <h2>Upload Test Series</h2>

    <input type="text" placeholder="Test Name"><br>
    <input type="text" placeholder="Duration"><br>
    <input type="text" placeholder="Number of Questions"><br>

   <div class="upload-box">
    Drag & Drop CSV File Here
</div>
    <button>Upload File</button>
</div>

</body>
</html>
